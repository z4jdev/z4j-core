name: Bug report
description: Report a problem with z4j-core
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in `z4j-core`.

        **Security bugs do NOT belong here.** If you believe you've found
        a security issue (especially in `transport`, `redaction`, or
        `policy`), please email `security@z4j.com` - see
        [SECURITY.md](../blob/main/SECURITY.md).

  - type: input
    id: z4j-core-version
    attributes:
      label: z4j-core version
      description: Output of `pip show z4j-core | grep -E 'Name|Version'`
      placeholder: z4j-core 1.0.0
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: 3.14.4
    validations:
      required: true

  - type: input
    id: pydantic-version
    attributes:
      label: Pydantic version
      placeholder: pydantic 2.9.2
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - z4j_core.models
        - z4j_core.protocols
        - z4j_core.transport (wire protocol / HMAC)
        - z4j_core.redaction
        - z4j_core.policy
        - z4j_core.errors
        - Unsure / multiple
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A standalone script is ideal.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full traceback if applicable.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This is NOT a security issue (those go to security@z4j.com)
          required: true
